workflows:
  android-release:
    name: MY FARM Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Regenerate Android platform files (fix v1 embedding)
        script: flutter create --platforms=android --project-name my_farm .
      - name: Get Flutter packages
        script: flutter pub get
      - name: Patch tflite_flutter (JVM 17 + compileSdk 36)
        script: |
          PLUGIN=$(find "$HOME/.pub-cache" -type d -name "tflite_flutter-*" | head -1)
          GF="$PLUGIN/android/build.gradle"
          echo "Patching: $GF"
          # JVM 17
          perl -i -pe 's/JavaVersion\.VERSION_1_8/JavaVersion.VERSION_17/g' "$GF"
          perl -0777 -i -pe 's/(compileOptions\s*\{[^}]*\})/$1\n    kotlinOptions {\n        jvmTarget = "17"\n    }/s unless /kotlinOptions/' "$GF"
          # Bump the plugin compileSdkVersion 31 -> 36 (deps require >=33)
          perl -i -pe 's/compileSdkVersion\s+31/compileSdkVersion 36/g' "$GF"
          # Bump the bundled TensorFlow Lite runtime so it understands ops from
          # newer TF (our Colab-exported EfficientNet models). 2.11 is too old.
          perl -i -pe 's/tflite_version = "2\.11\.0"/tflite_version = "2.14.0"/g' "$GF"
          echo "=== PATCHED tflite build.gradle ==="; cat "$GF"
      - name: Fix TensorFlow namespace conflict
        script: |
          GP="android/gradle.properties"
          {
            echo ""
            echo "android.uniquePackageNames=false"
            echo "android.nonTransitiveRClass=false"
          } >> "$GP"
          echo "=== gradle.properties ==="; cat "$GP"
      - name: Disable R8 minification
        script: |
          BG="android/app/build.gradle.kts"
          perl -0777 -i -pe 's/(release\s*\{)/$1\n            isMinifyEnabled = false\n            isShrinkResources = false/s unless /isMinifyEnabled/' "$BG"
          echo "=== release block ==="; grep -A6 "release {" "$BG"
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk