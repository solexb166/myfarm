workflows:
  android-release:
    name: MY FARM Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Regenerate Android platform files (fix v1 embedding)
        script: flutter create --platforms=android --project-name my_farm .
      - name: Get Flutter packages
        script: flutter pub get
      - name: Patch tflite_flutter to JVM 17
        script: |
          set -e
          PLUGIN=$(find "$HOME/.pub-cache" -type d -name "tflite_flutter-*" | head -1)
          GF="$PLUGIN/android/build.gradle"
          echo "Patching: $GF"
          echo "=== BEFORE ==="; cat "$GF"
          # Bump Java 1.8 -> 17
          sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g' "$GF"
          # Add kotlinOptions jvmTarget "17" right after the targetCompatibility line
          # (only if kotlinOptions not already present)
          if ! grep -q "kotlinOptions" "$GF"; then
            sed -i '/targetCompatibility JavaVersion.VERSION_17/a\        }\n        kotlinOptions {\n            jvmTarget = "17"' "$GF"
          fi
          echo "=== AFTER ==="; cat "$GF"
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk